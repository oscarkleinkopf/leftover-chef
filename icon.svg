<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Dark Background -->
  <rect width="512" height="512" rx="100" fill="#0b0f19" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#neonGlow)" stroke-width="8" opacity="0.4" filter="url(#glowEffect)" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#neonGlow)" stroke-width="3" />

  <!-- Chef Hat / Bowl Design -->
  <g transform="translate(128, 110)" filter="url(#glowEffect)">
    <!-- Chef Hat Poufs -->
    <path d="M 70,100 C 40,70 60,30 90,40 C 100,10 150,10 160,40 C 190,30 210,70 180,100 Z" fill="url(#neonGlow)" opacity="0.9" />
    <!-- Hat band -->
    <rect x="78" y="94" width="96" height="18" rx="5" fill="#06b6d4" />
    
    <!-- Mixing Bowl (Thermomix shape representation) -->
    <path d="M 50,140 L 60,230 C 62,250 80,260 128,260 C 176,260 194,250 196,230 L 206,140 Z" fill="none" stroke="url(#neonGlow)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Liquid / Food Level -->
    <path d="M 64,175 Q 128,190 192,175 L 188,215 C 187,225 170,242 128,242 C 86,242 69,225 68,215 Z" fill="#06b6d4" opacity="0.3" />
    
    <!-- Mixing blades / sparkles inside -->
    <path d="M 115,200 L 141,220 M 141,200 L 115,220" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
